name: Release

# Build installers for Windows, macOS, and Linux — each on its own native runner.
# Then a single dedicated `release` job downloads all three sets of artifacts and
# publishes them to the GitHub Release — avoiding the asset-upload race when three
# matrix jobs hit the same release in parallel.
#
# Triggers:
#   • push a version tag (v*)  → builds all three AND publishes them as a GitHub Release
#   • "Run workflow" button     → builds all three, artifacts only (no Release)
#
# The Electron app lives in the nested  remoteCommander/  subfolder, so every step that
# touches the app sets working-directory accordingly.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write        # needed by the release job to create/update the GitHub Release

# Insurance for any third-party action that still targets Node 20 — official
# actions below are pinned to v5; this env keeps still-Node-20 actions working.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux      # → AppImage + .deb
          - os: windows-latest
            target: win        # → NSIS setup.exe
          - os: macos-latest
            target: mac        # → .dmg (x64 + arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: remoteCommander/package-lock.json

      # keytar builds against libsecret on Linux; install its dev headers as a fallback.
      - name: Install Linux build deps
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        working-directory: remoteCommander
        run: npm ci

      # `-- --publish never` lands on the trailing electron-builder call so a tag build
      # never tries to upload to the placeholder `publish` URL in electron-builder.yml.
      - name: Build installers
        working-directory: remoteCommander
        run: npm run build:${{ matrix.target }} -- --publish never
        env:
          # Don't attempt macOS code-signing in CI (unsigned builds for now).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: remote-commander-${{ matrix.target }}
          if-no-files-found: error
          path: |
            remoteCommander/dist/*.exe
            remoteCommander/dist/*.dmg
            remoteCommander/dist/*.AppImage
            remoteCommander/dist/*.deb

  # Single uploader runs only on tag pushes, after all three matrix builds finish.
  # Uses the `gh` CLI (pre-installed on runners, native GITHUB_TOKEN) for *sequential*
  # uploads — softprops/action-gh-release@v2 uploads in parallel and the GitHub asset
  # API rate-limits/auth-fails when several uploads are inflight against the same
  # release, regardless of whether they're across jobs or within one.
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List assets to publish
        run: ls -la dist/

      - name: Create or update the GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          NOTES: |
            This is the latest release of **Remote Commander** (${{ github.ref_name }}).

            Download the installer for your OS below, then follow the matching install guide:
            **[Windows](https://github.com/RonBulaon/remoteCommander/blob/main/docs/install-windows.md)** ·
            **[macOS](https://github.com/RonBulaon/remoteCommander/blob/main/docs/install-macos.md)** ·
            **[Linux](https://github.com/RonBulaon/remoteCommander/blob/main/docs/install-linux.md)**
        run: |
          set -e

          # Create the release if it doesn't exist yet; otherwise just refresh the notes.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::group::Updating existing release $TAG"
            gh release edit "$TAG" --notes "$NOTES"
            echo "::endgroup::"
          else
            echo "::group::Creating release $TAG"
            gh release create "$TAG" --title "$TAG" --notes "$NOTES"
            echo "::endgroup::"
          fi

          # Upload each asset *sequentially*; --clobber replaces existing assets in place.
          for f in dist/*.exe dist/*.dmg dist/*.AppImage dist/*.deb; do
            if [ -f "$f" ]; then
              echo "::group::Upload $(basename "$f")"
              gh release upload "$TAG" "$f" --clobber
              echo "::endgroup::"
            else
              echo "(skip: no file matches $f)"
            fi
          done

          echo "::group::Final asset list on $TAG"
          gh release view "$TAG" --json assets --jq '.assets[] | "\(.name)  (\(.size) bytes)"'
          echo "::endgroup::"
